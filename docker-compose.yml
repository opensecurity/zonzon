services:
  zonzon:
    build: .
    cap_add:
      - NET_ADMIN
    ports:
      - "8080:80/tcp"
    volumes:
      - ./config:/app/config:ro
    environment:
      - ZONZON_PORT=53
      - ZONZON_FALLBACK_DNS=1.1.1.1
    restart: unless-stopped
    command: ["start", "--config", "/app/config/hosts.json"]
    networks:
      sandbox_net:
        ipv4_address: 172.20.0.53
      test_net:
      external_net:

  nginx_test:
    image: nginx:alpine
    volumes:
      - ./tests/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tests/nginx/certs:/etc/nginx/ssl:ro
    networks:
      test_net:
        ipv4_address: 172.21.0.100

  llm_sandbox:
    build:
      context: .
      dockerfile: tests/Dockerfile.sandbox
    command: sleep infinity
    dns:
      - 172.20.0.53
    networks:
      sandbox_net:

networks:
  sandbox_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
  test_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/16
  external_net:
    driver: bridge