services:
  zonzon:
    build: .
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config:/app/config:ro
    environment:
      - ZONZON_PORT=53
      - ZONZON_FALLBACK_DNS=1.1.1.1
      - ZONZON_DEFAULT_POLICY=deny
      - ZONZON_FIREWALL_ALLOWLIST_IPS=127.0.0.1,172.20.0.1
      - ZONZON_FIREWALL_ALLOWLIST_DOMAINS=github.com,ubuntu.com
    restart: unless-stopped
    command: ["--config", "/app/config/hosts.yaml"]
    networks:
      sandbox_net:
        ipv4_address: 172.20.0.53
      external_net:

  llm_sandbox:
    image: ubuntu:rolling
    command: sleep infinity
    dns:
      - 172.20.0.53
    networks:
      sandbox_net:

networks:
  sandbox_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
  external_net:
    driver: bridge