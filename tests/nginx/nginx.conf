user nginx;
worker_processes 2;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log    /var/log/nginx/access.log;
    error_log     /var/log/nginx/error.log warn;

    # Server 1: Strict mTLS Boundary (Port 1234)
    server {
        listen 1234 ssl;
        server_name secure.test.local;

        # Dedicated mTLS TLS Material
        ssl_certificate     /etc/nginx/ssl/nginx-mtls.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-mtls.key;

        # Strict mTLS Enforcement Boundary
        ssl_verify_client on;
        ssl_client_certificate /etc/nginx/ssl/custom-ca.crt;
        ssl_verify_depth 2;

        # Modern Cryptographic Primitives
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            default_type text/plain;
            # Return the authenticated Client DN to prove the handshake succeeded
            return 200 "[NGINX UPSTREAM] zonzon successfully proxied traffic to strict mTLS port 1234\n[mTLS VERIFIED IDENTITY] $ssl_client_s_dn\n";
        }
    }

    # Server 2: Standard Anonymous TLS (Port 1235)
    server {
        listen 1235 ssl;
        server_name secure.test.local;

        # Dedicated Standard TLS Material
        ssl_certificate     /etc/nginx/ssl/nginx-standard.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-standard.key;

        # Standard Anonymous TLS - Explicitly disable Client Verification
        ssl_verify_client off;

        # Modern Cryptographic Primitives
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            default_type text/plain;
            return 200 "[NGINX UPSTREAM] zonzon successfully routed L4 SNI TCP stream to public TLS port 1235\n[STANDARD TLS] Anonymous connection accepted\n";
        }
    }
}